<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大猩猩的雨林家園</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --forest-green: #2d5a27;   /* 深綠色 */
            --leaf-light: #e8f5e9;     /* 淺綠色 */
            --toucan-orange: #ff9800;  /* 橘色 */
            --wood-brown: #795548;     /* 棕色 */
            --text-dark: #1b331a;      /* 深綠文字 */
            --ocean-green: #f1f8e9;    /* 按鈕區背景 */
            --ice-white: #ffffff;      
            --ice-shadow: #558b2f;     
        }

        body { 
            margin: 0; font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #ffffff; color: var(--text-dark);
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }

        .header-section {
            width: 100%; background-color: var(--forest-green);
            padding-bottom: 60px; position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        .cloud-speech {
            position: relative; background: #fff; border-radius: 30px;
            padding: 12px 25px; margin-top: 25px; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; color: var(--forest-green);
        }
        .cloud-speech::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            width: 16px; height: 16px; background: white; border-radius: 50%; transform: translateX(-50%);
        }

        model-viewer { width: 100%; height: 320px; background: transparent; }

        .ice-transition {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; 
            display: flex; justify-content: center; align-items: flex-end; pointer-events: none;
        }
        .ice-l { background: #689f38; left: -10%; width: 60%; height: 100%; position: absolute; border-radius: 100% 0% 100% 0%; transform: rotate(-5deg); z-index: 2; }
        .ice-r { background: #8bc34a; right: -10%; width: 60%; height: 100%; position: absolute; border-radius: 0% 100% 0% 100%; transform: rotate(5deg); opacity: 0.9; z-index: 1; }
        
        .ocean-content {
            width: 100%; padding: 40px 20px; box-sizing: border-box;
            background-color: var(--ocean-green); 
            display: flex; flex-direction: column; align-items: center;
            min-height: 800px;
        }

        .ice-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; max-width: 400px; padding: 20px 0; }
        
        .ice-block {
            position: relative; width: 140px; height: 90px; background: #8bc34a;
            border-radius: 0% 100% 0% 100%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-weight: bold; font-size: 18px; color: var(--forest-green);
            box-shadow: 0 8px 0 var(--ice-shadow); transform: rotate(-8deg); transition: 0.1s;
        }
        .ice-block span { transform: rotate(8deg); }
        .ice-block:active { transform: translateY(6px) rotate(0deg); box-shadow: 0 2px 0 var(--ice-shadow); }
        .ice-block:active span { transform: rotate(0deg); }

        .info-card {
            display: none; width: 100%; max-width: 380px; margin-top: 25px;
            background: #fff; border-radius: 30px; padding: 25px;
            border: 3px solid #8bc34a; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(139, 195, 74, 0.3);
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .ice-photo-frame { width: 100%; border-radius: 20px; box-shadow: 0 8px 0 var(--wood-brown); margin-bottom: 20px; overflow: hidden; }
        .ice-photo-frame img { width: 100%; height: 200px; object-fit: cover; display: block; }

        .game-progress { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        .progress-fill { width: 20%; height: 100%; background: #4caf50; transition: 0.3s; }
        
        .game-btn { width: 100%; padding: 15px; margin: 8px 0; border: none; background: #f1f8e9; border-radius: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #558b2f; color: var(--forest-green); }
        .correct { background: #e6ffed !important; color: #22863a !important; box-shadow: 0 4px 0 #22863a !important; }

        /* 翻轉卡片 */
        .knowledge-card-container { perspective: 1000px; width: 100%; height: 200px; margin-bottom: 20px; cursor: pointer; }
        .knowledge-card-inner { position: relative; width: 100%; height: 100%; transition: 0.6s; transform-style: preserve-3d; }
        .knowledge-card-container.flipped .knowledge-card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; box-sizing: border-box; border: 2px solid #8bc34a; }
        .card-back { transform: rotateY(180deg); background: #fff; border-color: #ffd700; }

        /* 成就彈窗 */
        .achievement-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .achievement-card { background: linear-gradient(180deg, #ffe082 0%, #ffca28 100%); width: 80%; max-width: 300px; padding: 30px; border-radius: 30px; text-align: center; border: 5px solid #fff; }
        .confetti-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; display: none; z-index: 100; }
        .confetti { position: absolute; width: 8px; height: 8px; animation: fall 2s linear forwards; }
        @keyframes fall { 0% { transform: translateY(-10px); opacity: 1; } 100% { transform: translateY(300px); opacity: 0; } }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="cloud-speech">哈囉！我是銀背大猩猩！🦍</div>
        <model-viewer src="https://cdn.jsdelivr.net/gh/yenmeiomni/animal-game@main/gorilla_v1.glb" auto-rotate camera-controls ar></model-viewer>
        <div class="ice-transition"><div class="ice-l"></div><div class="ice-r"></div></div>
    </div>

    <div class="ocean-content">
        <div class="ice-grid">
            <div class="ice-block" onclick="openBox('box1')"><span>認識我</span></div>
            <div class="ice-block" onclick="openBox('box2')"><span>小小秘密</span></div>
            <div class="ice-block" onclick="openBox('box3')"><span>互動遊戲</span></div>
            <div class="ice-block" onclick="openBox('box4')"><span>生活影像</span></div>
        </div>

        <div id="box1" class="info-card">
            <div class="ice-photo-frame"><img src="./gorilla_photo_01.jpg"></div>
            <p><b>🏠 住址：</b> 非洲熱帶雨林</p>
            <p><b>🍴 愛吃：</b> 嫩葉、竹筍、水果</p>
            <button class="game-btn" onclick="playAudio()">🔊 聽聽我的叫聲</button>
            <p style="font-size: 15px; color: #666; margin-top: 15px;"><b>● 銀色的背部：</b>成熟雄性的特徵。</p>
        </div>

        <div id="box2" class="info-card">
            <h3 style="text-align: center;">💡 點點看，找秘密！</h3>
            <div class="knowledge-card-container" onclick="this.classList.toggle('flipped')">
                <div class="knowledge-card-inner">
                    <div class="card-front"><div style="font-size: 40px;">❓</div><p>我拍打胸部是想打架嗎？</p></div>
                    <div class="card-back"><p><b>✨ 不一定唷！</b></p><p>有時是溝通或打招呼，我很溫和的！</p></div>
                </div>
            </div>
        </div>

        <div id="box3" class="info-card" style="position: relative; overflow: hidden;">
            <div id="confetti" class="confetti-container"></div>
            <h3 id="game-title" style="text-align: center;">🎮 森林挑戰</h3>
            <div class="game-progress"><div id="progress" class="progress-fill"></div></div>
            <div id="game-content">
                <div class="ice-photo-frame"><img id="game-img" src=""></div>
                <p id="game-question" style="text-align: center; font-weight: bold;"></p>
                <div id="options-area"></div>
            </div>
            <p id="msg" style="text-align:center; font-weight:bold; margin-top:10px;"></p>
        </div>

        <div id="box4" class="info-card">
            <h3>🖼️ 生活影像</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <img src="./gorilla_photo_03.jpg" style="width:100%; border-radius:10px;">
                <iframe src="https://www.youtube.com/embed/w5ZXH1VkILY?rel=0" style="width:100%; height:100px; border-radius:10px; border:none;"></iframe>
            </div>
        </div>
    </div>

    <div id="achievementPopup" class="achievement-overlay">
        <div class="achievement-card">
            <h2>🏆 森林首領！</h2>
            <p>你已經完全了解大猩猩了！</p>
            <button class="game-btn" style="background:#fff;" onclick="closeAchievement()">太棒了</button>
        </div>
    </div>

    <audio id="snd" src="https://cdn.jsdelivr.net/gh/yenmeiomni/animal-game@main/gorilla_sound_01.mp3"></audio>

    <script>
        function openBox(id) {
            document.querySelectorAll('.info-card').forEach(c => c.style.display = 'none');
            const target = document.getElementById(id);
            if(target) {
                target.style.display = 'block';
                target.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function playAudio() { document.getElementById('snd').play(); }

        let currentStep = 1;
        let lastLevelScore = { forest: false, mountain: false };

        // 🦍 遊戲題目設計
        const quizData = {
            1: { q: "我平常喜歡吃什麼？", img: "./gorilla_photo_01.jpg", opt: [{t: "嫩葉與水果", ok: true}, {t: "熱狗堡", ok: false}] },
            2: { q: "我的背部變成銀灰色代表？", img: "./gorilla_photo_02.png", opt: [{t: "我長大成熟了", ok: true}, {t: "我老了", ok: false}] },
            3: { q: "我每天睡覺前會做什麼？", img: "./gorilla_photo_03.jpg", opt: [{t: "蓋一個葉子床", ok: true}, {t: "找山洞住", ok: false}] },
            4: { q: "我是如何溝通力量的？", img: "./gorilla_photo_04.jpeg", opt: [{t: "拍打胸脯", ok: true}, {t: "大聲尖叫", ok: false}] }
        };

        function updateQuiz(step) {
            const data = quizData[step];
            if(!data) return;
            document.getElementById('game-title').innerText = `🎮 森林挑戰：第 ${step} 關`;
            document.getElementById('progress').style.width = (step * 20) + "%";
            document.getElementById('game-img').src = data.img;
            document.getElementById('game-question').innerText = data.q;
            document.getElementById('msg').innerText = "";

            let html = "";
            data.opt.forEach(o => {
                html += `<button class="game-btn" onclick="nextStep(${step}, ${o.ok})">${o.t}</button>`;
            });
            document.getElementById('options-area').innerHTML = html;
        }

        function nextStep(step, isCorrect) {
            const m = document.getElementById('msg');
            if (isCorrect) {
                m.innerText = "🎉 太棒了！";
                m.style.color = "#22863a";
                showConfetti();
                setTimeout(() => {
                    currentStep++;
                    if (currentStep <= 4) updateQuiz(currentStep);
                    else showFinalLevel();
                }, 1000);
            } else {
                m.innerText = "❌ 再猜猜看？";
                m.style.color = "#d73a49";
            }
        }

        function showFinalLevel() {
            document.getElementById('game-title').innerText = `🎮 最終考驗`;
            document.getElementById('progress').style.width = "100%";
            document.getElementById('game-question').innerHTML = "請選出<b>兩個</b>適合大猩猩的積木家園！";
            document.getElementById('options-area').innerHTML = `
                <button class="game-btn" id="f1" onclick="checkFinal('forest')">🌳 茂密落葉積木</button>
                <button class="game-btn" id="f2" onclick="checkFinal('mountain')">⛰️ 高山森林積木</button>
            `;
        }

        function checkFinal(type) {
            if(type==='forest'){ lastLevelScore.forest = true; document.getElementById('f1').classList.add('correct'); }
            if(type==='mountain'){ lastLevelScore.mountain = true; document.getElementById('f2').classList.add('correct'); }
            if(lastLevelScore.forest && lastLevelScore.mountain) {
                showConfetti();
                setTimeout(() => { document.getElementById('achievementPopup').style.display='flex'; }, 1000);
            }
        }

        function showConfetti() {
            const c = document.getElementById('confetti');
            c.style.display = 'block'; c.innerHTML = '';
            for(let i=0; i<20; i++){
                const d = document.createElement('div');
                d.className = 'confetti'; d.style.left = Math.random()*100+'%';
                d.style.backgroundColor = ['#4caf50','#8bc34a','#ffeb3b'][Math.floor(Math.random()*3)];
                c.appendChild(d);
            }
            setTimeout(()=>c.style.display='none', 2000);
        }

        function closeAchievement() { document.getElementById('achievementPopup').style.display = 'none'; }
        
        // 初始啟動
        updateQuiz(1);
    </script>
</body>
</html>
