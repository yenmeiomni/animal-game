<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北極熊互動探索</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        /* 【顏色與字體設定】這裡可以隨意更換你喜歡的顏色 */
        :root {
            --primary-color: #0077be;    /* 主色調：深藍 */
            --accent-color: #87ceeb;     /* 輔色：淺藍 */
            --bg-color: #f8fbff;         /* 背景：極淺藍 */
            --text-color: #2c3e50;
            --btn-radius: 30px;          /* 按鈕圓角：30px 是膠囊狀，10px 是方圓形 */
        }

        body { 
            margin: 0; 
            font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 3D 視窗美化 */
        model-viewer { 
            width: 100%; 
            height: 350px; 
            background: radial-gradient(circle, #ffffff 0%, #e0f2fe 100%);
            border-bottom: 3px solid var(--accent-color);
        }

        .container { width: 100%; max-width: 500px; padding: 15px; box-sizing: border-box; }

        /* 【按鈕設計】修改這裡的樣式 */
        .menu { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin: 20px 0; 
        }

        .btn { 
            background: white; 
            border: 2px solid var(--primary-color); 
            padding: 12px; 
            border-radius: var(--btn-radius); 
            font-size: 15px; 
            font-weight: bold; 
            color: var(--primary-color);
            cursor: pointer;
            transition: all 0.3s ease; /* 增加平滑動畫 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 點擊或滑鼠移入的效果 */
        .btn:hover, .btn:active {
            background: var(--primary-color);
            color: white;
            transform: translateY(-3px); /* 向上浮起感 */
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        /* 資訊框美化 */
        .info-box { 
            background: white; 
            padding: 20px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            display: none; 
            margin-top: 10px;
        }

        /* 田字型媒體牆 */
        .media-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .media-item img, .media-item iframe {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #eee;
        }

        /* 互動小遊戲按鈕 */
        .game-choice {
            width: 100%;
            padding: 15px;
            margin: 8px 0;
            border-radius: 15px;
            border: 2px solid #ddd;
            background: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        .correct { background-color: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
    </style>
</head>
<body>

    <model-viewer 
        src="https://cdn.jsdelivr.net/gh/yenmeiomni/animal-game@main/Polarbear-v1.glb" 
        auto-rotate camera-controls ar shadow-intensity="1">
    </model-viewer>

    <div class="container">
        <h2 style="text-align: center; color: var(--primary-color);">🐾 北極熊探索教室</h2>

        <div class="menu">
            <button class="btn" onclick="showSection('features')">🔍 身體特徵</button>
            <button class="btn" onclick="showSection('facts')">💡 生態知識</button>
            <button class="btn" onclick="showSection('photos')">🖼️ 影像牆</button>
            <button class="btn" onclick="showSection('game')">🎮 挑戰家園</button>
        </div>

        <div id="features" class="info-box">
            <h3 style="color: var(--primary-color);">🔍 身體特徵</h3>
            <ul>
                <li><b>皮膚是黑色的：</b>用來吸收陽光熱量。</li>
                <li><b>中空的毛：</b>其實是透明的，看起來白是反射光。</li>
            </ul>
        </div>

        <div id="photos" class="info-box">
            <h3 style="color: var(--primary-color);">🖼️ 影像牆</h3>
            <div class="media-grid">
                <div class="media-item">
                    <img src="./polarbear_photo_01.jpg">
                </div>
                <div class="media-item" style="position: relative;">
                    <iframe src="https://www.youtube.com/embed/0Pi0Pd4Cvqg?rel=0" allowfullscreen></iframe>
                </div>
                <div class="media-item">
                    <img src="./polarbear_photo_02.png">
                </div>
                <div class="media-item">
                    <img src="./polarbear_photo_03.jpg">
                </div>
            </div>
        </div>

        <div id="game" class="info-box">
            <h3>🎮 建造家園</h3>
            <p>北極熊最適合住在？</p>
            <button class="game-choice" onclick="checkAns(this, true)">❄️ 寒冷的冰原</button>
            <button class="game-choice" onclick="checkAns(this, false)">🏜️ 炎熱的沙漠</button>
            <p id="msg" style="text-align: center; font-weight: bold;"></p>
        </div>
    </div>

    <script>
        // 切換顯示區塊的指令
        function showSection(id) {
            document.querySelectorAll('.info-box').forEach(box => box.style.display = 'none');
            const target = document.getElementById(id);
            target.style.display = 'block';
            target.scrollIntoView({ behavior: 'smooth' });
        }

        // 遊戲判斷指令
        function checkAns(btn, isCorrect) {
            const msg = document.getElementById('msg');
            if(isCorrect) {
                btn.classList.add('correct');
                msg.innerText = "🎉 答對了！你太棒了！";
                msg.style.color = "#22c55e";
            } else {
                msg.innerText = "❌ 答錯囉，再試一次！";
                msg.style.color = "#ef4444";
            }
        }
    </script>
</body>
</html>
