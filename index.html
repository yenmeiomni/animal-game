<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北極熊可愛探索網頁</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        :root {
            --dusty-blue: #7ba2c1;
            --white: #ffffff;
            --btn-blue: #72a2d4;
            --text-color: #333333;
        }

        body { 
            margin: 0; font-family: "Microsoft JhengHei", sans-serif; 
            background-color: var(--white); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }

        /* 【區塊 A: 3D 視窗與雲朵對話框】 */
        .model-section {
            width: 100%; background-color: var(--dusty-blue);
            padding-bottom: 60px; position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 雲朵對話框 */
        .cloud-speech {
            position: relative; background: #fff; border-radius: 50px;
            padding: 15px 30px; margin-top: 30px; font-weight: bold; font-size: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; align-items: center;
        }
        .cloud-speech::after { /* 雲朵的小尾巴 */
            content: ''; position: absolute; bottom: -10px; left: 50%;
            width: 20px; height: 20px; background: white; border-radius: 50%; transform: translateX(-50%);
        }

        /* 小喇叭按鈕 */
        .speaker-btn {
            margin-left: 10px; cursor: pointer; font-size: 24px;
            transition: transform 0.2s;
        }
        .speaker-btn:active { transform: scale(1.2); }

        model-viewer { width: 100%; height: 320px; background: transparent; }

        /* 【兩座小冰山轉場】取代三角旗 */
        .iceberg-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60px; pointer-events: none;
        }
        .iceberg-left { /* 左邊大冰山 */
            position: absolute; bottom: 0; left: -10%; width: 70%; height: 100%;
            background-color: white; clip-path: polygon(0% 100%, 30% 20%, 100% 100%);
        }
        .iceberg-right { /* 右邊小冰山 */
            position: absolute; bottom: 0; right: -5%; width: 50%; height: 60%;
            background-color: white; opacity: 0.8; clip-path: polygon(0% 100%, 50% 10%, 100% 100%);
        }

        /* 【區塊 B: 內容與六邊形按鈕】 */
        .content-section {
            width: 100%; padding: 40px 20px; box-sizing: border-box;
            background: url('https://www.transparenttextures.com/patterns/paws.png'); /* 這裡會顯示淡淡的小腳印圖案 */
            display: flex; flex-direction: column; align-items: center;
        }

        .main-layout {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            width: 100%; max-width: 400px; align-items: center;
        }

        /* 按鈕路徑動畫：由下往上浮現 */
        .menu-btn-group {
            display: flex; flex-direction: column; gap: 10px;
            animation: slideUp 1s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 【六邊形按鈕】 */
        .btn-hex {
            background: var(--btn-blue); color: white; border: none;
            width: 120px; height: 45px; font-weight: bold; cursor: pointer;
            clip-path: polygon(15% 0%, 85% 0%, 100% 50%, 85% 100%, 15% 100%, 0% 50%);
            transition: all 0.3s; margin: 5px 0;
        }
        .btn-hex:active { background: #5a8bbd; transform: scale(0.9); }

        /* 資訊顯示框 */
        .info-box { 
            width: 100%; max-width: 400px; margin-top: 20px; display: none;
            background: white; border-radius: 20px; padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 2px dashed var(--dusty-blue);
        }

        .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .media-item img, .media-item iframe { width: 100%; height: 110px; object-fit: cover; border-radius: 12px; }

        /* 遊戲按鈕同樣設定為六邊形 */
        .game-choice-hex {
            width: 100%; padding: 15px; border: 2px solid var(--btn-blue);
            background: white; border-radius: 15px; font-size: 16px; margin: 10px 0;
            cursor: pointer; transition: 0.3s;
        }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; }
    </style>
</head>
<body>

    <div class="model-section">
        <div class="cloud-speech">
            哈囉！我是北極熊！
            <span class="speaker-btn" onclick="playSound()">📢</span>
        </div>
        
        <model-viewer src="https://cdn.jsdelivr.net/gh/yenmeiomni/animal-game@main/Polarbear-v1.glb" auto-rotate camera-controls ar></model-viewer>

        <div class="iceberg-container">
            <div class="iceberg-left"></div>
            <div class="iceberg-right"></div>
        </div>
    </div>

    <div class="content-section">
        <div class="main-layout">
            <img src="https://cdn.jsdelivr.net/gh/yenmeiomni/animal-game@main/你的北極熊生活照.jpg" style="width: 100%; border-radius: 20px;">

            <div class="menu-btn-group">
                <button class="btn-hex" onclick="show('features')">認識我</button>
                <button class="btn-hex" onclick="show('facts')">尋找線索</button>
                <button class="btn-hex" onclick="show('photos')">小影片</button>
                <button class="btn-hex" onclick="show('game')">互動遊戲</button>
            </div>
        </div>

        <div id="features" class="info-box">
            <h3>🐾 我的小秘密</h3>
            <p>● 我的皮膚其實是黑色的喔！<br>● 我的腳掌很大，走路不會滑倒。</p>
        </div>

        <div id="photos" class="info-box">
            <h3>🖼️ 影像牆</h3>
            <div class="photo-grid">
                <div class="media-item"><img src="./polarbear_photo_01.jpg"></div>
                <div class="media-item"><iframe src="https://www.youtube.com/embed/0Pi0Pd4Cvqg?rel=0"></iframe></div>
                <div class="media-item"><img src="./polarbear_photo_02.png"></div>
                <div class="media-item"><img src="./polarbear_photo_03.jpg"></div>
            </div>
        </div>

        <div id="game" class="info-box">
            <h3 style="text-align:center">🎮 找找我的家</h3>
            <img src="https://cdn.jsdelivr.net/gh/yenmeiomni/animal-game@main/你的積木照片.jpg" style="width:100%; border-radius:15px;">
            <p style="text-align:center">哪一個環境是北極熊的家呢？</p>
            <button class="game-choice-hex" onclick="ans(this, false)">🏜️ 炎熱沙漠</button>
            <button class="game-choice-hex" onclick="ans(this, true)">❄️ 寒冷冰原</button>
            <p id="feedback" style="text-align:center; font-weight:bold"></p>
        </div>
    </div>

    <audio id="bearSound" src="https://www.soundjay.com/nature/sounds/bear-growl-01.mp3"></audio>

    <script>
        function playSound() {
            document.getElementById('bearSound').play();
        }

        function show(id) {
            document.querySelectorAll('.info-box').forEach(b => b.style.display = 'none');
            const target = document.getElementById(id);
            target.style.display = 'block';
            target.scrollIntoView({ behavior: 'smooth' });
        }

        function ans(btn, isCorrect) {
            const f = document.getElementById('feedback');
            if(isCorrect) {
                btn.classList.add('correct');
                f.innerText = "🎉 答對了！好涼快呀！";
                f.style.color = "green";
            } else {
                f.innerText = "❌ 嗚～這裡太熱了啦！";
                f.style.color = "red";
            }
        }
    </script>
</body>
</html>
