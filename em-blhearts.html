<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>皇帝企鵝的冰雪家園 </title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    
    <style>
        /* 這裡完全保留你原本的配色與樣式設定 */
        :root {
            --polar-blue: #005a8d;
            --ice-light: #e0f2f1;
            --penguin-black: #2c3e50;
            --snow-white: #ffffff;
            --accent-gold: #ffc107;
            --ocean-blue: #e3f2fd;
            --ice-white: #ffffff;
            --ice-shadow: #b0bec5;
        }

        body { 
            margin: 0; font-family: "Microsoft JhengHei", sans-serif; 
            background-color: #ffffff; color: var(--penguin-black);
            display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
        }

        .header-section {
            width: 100%; background-color: var(--polar-blue);
            padding-bottom: 60px; position: relative;
            display: flex; flex-direction: column; align-items: center;
        }

        .cloud-speech {
            position: relative; background: #fff; border-radius: 30px;
            padding: 12px 25px; margin-top: 25px; font-weight: bold; font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center;
            z-index: 10; color: var(--polar-blue);
        }
        .cloud-speech::after {
            content: ''; position: absolute; bottom: -8px; left: 50%;
            width: 16px; height: 16px; background: white; border-radius: 50%; transform: translateX(-50%);
        }

        model-viewer { width: 100%; height: 320px; background: transparent; }

        .ice-transition {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 80px; 
            display: flex; justify-content: center; align-items: flex-end; pointer-events: none;
        }
        .ice-l, .ice-r { width: 60%; height: 100%; position: absolute; bottom: -10px; }
        .ice-l { background: #f8fdff; left: -10%; border-radius: 100% 0% 100% 0%; transform: rotate(-5deg); z-index: 2; }
        .ice-r { background: #e0f7fa; right: -10%; border-radius: 0% 100% 0% 100%; transform: rotate(5deg); opacity: 0.9; z-index: 1; }
        
        .ocean-content {
            width: 100%; padding: 40px 20px; box-sizing: border-box;
            background-color: var(--ocean-blue); 
            display: flex; flex-direction: column; align-items: center;
            position: relative; min-height: 800px;
        }

        .ice-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; max-width: 400px; padding: 20px 0; z-index: 5; }
        
        /* 你的冰塊按鈕樣式 */
        .ice-block {
            position: relative; width: 140px; height: 90px; background: var(--ice-white);
            border-radius: 15px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-weight: bold; font-size: 18px; color: var(--polar-blue);
            box-shadow: 0 8px 0 var(--ice-shadow), 0 15px 25px rgba(0,0,0,0.08);
            transition: all 0.15s ease; z-index: 5;
        }
        .ice-grid .ice-block:nth-child(odd) { transform: rotate(-8deg); }
        .ice-grid .ice-block:nth-child(even) { transform: rotate(8deg); }
        .ice-block span { display: inline-block; }
        .ice-grid .ice-block:nth-child(odd) span { transform: rotate(8deg); }
        .ice-grid .ice-block:nth-child(even) span { transform: rotate(-8deg); }

        .ice-block:active { transform: translateY(6px) rotate(0deg) !important; box-shadow: 0 2px 0 var(--ice-shadow); }
        .ice-block:active span { transform: rotate(0deg) !important; }

        .info-card {
            display: none; width: 95%; max-width: 500px; margin: 25px auto;
            background: #fff; border-radius: 30px; padding: 25px;
            border: 3px solid #b0bec5; box-sizing: border-box;
            box-shadow: 0 0 30px rgba(176, 190, 197, 0.4);
            animation: slideUp 0.4s ease-out;
        }
